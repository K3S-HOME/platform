# Telepresence OSS Helm Values
# Chart: oci://ghcr.io/telepresenceio/telepresence-oss

replicaCount: 1

# Log level
logLevel: info

# Agent Injector configuration
agentInjector:
  enabled: true
  injectPolicy: OnDemand

# RBAC configuration
managerRbac:
  create: true

# Agent configuration
agent:
  port: 9900
  initContainer:
    enabled: true

# Hooks configuration
hooks:
  busybox:
    registry: docker.io
    image: busybox
    tag: latest
  curl:
    registry: docker.io
    image: curlimages/curl
    tag: 8.1.1
