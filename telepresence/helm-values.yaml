# Telepresence Helm Values
# Chart: https://github.com/telepresenceio/telepresence

replicaCount: 1

# Traffic Manager resources
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 128Mi

# Agent resources (injected sidecar)
agent:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 64Mi
  initResources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 32Mi

# Hooks resources
hooks:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 32Mi

# Log level
logLevel: info

# Agent Injector configuration
agentInjector:
  enabled: true
  injectPolicy: OnDemand

# RBAC configuration
managerRbac:
  create: true
  namespaced: false

# Client RBAC (disabled - managed separately if needed)
clientRbac:
  create: false
